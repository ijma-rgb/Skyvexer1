<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKYVEXER : IGNITION — 블록을 쌓아 하늘 끝까지</title>
  <meta name="description" content="블록을 놓아 높이 올라가는 브라우저 게임. 대시, 2단 점프, 보스전까지. 무료로 플레이하세요.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #0a0e1a 0%, #050810 50%, #020408 100%);
      font-family: 'Noto Sans KR', sans-serif;
      color: #e8f2ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 400;
      color: #fff;
      text-shadow: 0 0 40px rgba(100, 160, 255, 0.5);
      margin-bottom: 0.25em;
    }
    .sub {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      color: rgba(180, 210, 255, 0.9);
      letter-spacing: 0.2em;
      margin-bottom: 1.5rem;
    }
    p {
      max-width: 420px;
      font-size: 0.95rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 2rem;
    }
    a.play {
      display: inline-block;
      padding: 18px 48px;
      font-size: 1.2rem;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      letter-spacing: 0.15em;
      color: #0a0e1a;
      background: linear-gradient(180deg, #7ec8ff 0%, #4a9eff 50%, #2d7de8 100%);
      border: none;
      border-radius: 999px;
      text-decoration: none;
      box-shadow: 0 0 40px rgba(74, 158, 255, 0.4), 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    }
    a.play:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 55px rgba(74, 158, 255, 0.5), 0 12px 40px rgba(0, 0, 0, 0.45);
      filter: brightness(1.08);
    }
    a.play:active {
      transform: translateY(0) scale(0.98);
    }
    .tip {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>
<body>
  <h1>SKYVEXER</h1>
  <p class="sub">IGNITION</p>
  <p>블록을 놓아 높이 올라가세요. 대시, 2단 점프, 5000m마다 보스전. 브라우저에서 바로 플레이합니다.</p>
  <a href="game_fixed.html" class="play">플레이</a>
  <p class="tip">PC 권장 · A/D 이동, Space 점프, E 상점</p>
</body>
</html>
